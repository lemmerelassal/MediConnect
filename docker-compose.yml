version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mediconnect_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mediconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mediconnect-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediconnect_backend
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/mediconnect
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_GRPC_SERVER_PORT: 9000
      FILE_UPLOAD_DIRECTORY: /app/uploads
    ports:
      - "8080:8080"
      - "9000:9000"
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mediconnect-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediconnect_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - mediconnect-network
    restart: unless-stopped

volumes:
  postgres_data:
  upload_data:

networks:
  mediconnect-network:
    driver: bridge
