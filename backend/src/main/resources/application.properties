# Database configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/pharma_shortage

# Hibernate configuration
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file

# HTTP configuration
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# File upload
quarkus.http.body.multipart.file-content-types=application/pdf,image/jpeg,image/png,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
quarkus.http.limits.max-body-size=10M

# gRPC configuration
quarkus.grpc.server.port=9000
quarkus.grpc.server.host=0.0.0.0

# JWT Configuration
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://pharma-shortage.com
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem
smallrye.jwt.new-token.lifespan=3600
smallrye.jwt.new-token.issuer=https://pharma-shortage.com

# JWT Custom properties
jwt.access.token.expiry=3600
jwt.refresh.token.expiry=604800

# Security
quarkus.http.auth.permission.public.paths=/api/auth/*,/api/public/*,/q/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Email configuration (SMTP)
quarkus.mailer.from=noreply@pharma-shortage.com
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${SMTP_USERNAME:your-email@gmail.com}
quarkus.mailer.password=${SMTP_PASSWORD:your-app-password}
quarkus.mailer.mock=false

# Email templates
email.templates.base-url=http://localhost:4200

# File storage
file.upload.directory=${user.home}/pharma-uploads
file.upload.max-size=10485760

# Scheduler
quarkus.scheduler.enabled=true

# OpenAPI/Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Logging
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.level=INFO
quarkus.log.category."com.pharma".level=DEBUG

# Metrics
quarkus.micrometer.export.prometheus.enabled=true

# Dev mode
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/pharma_shortage
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.mailer.mock=true
%dev.file.upload.directory=./uploads

# Production
%prod.quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pharma_shortage}
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.log.console.level=INFO
%prod.quarkus.mailer.mock=false
%prod.file.upload.directory=/var/pharma-uploads
